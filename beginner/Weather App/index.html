<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petal Weather</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f5f0eb;
    --surface:   #fefcf9;
    --surface2:  #f9f4ef;
    --border:    rgba(180,160,140,0.2);
    --border2:   rgba(180,160,140,0.35);
    --text:      #3a3028;
    --muted:     #9a8878;
    --rose:      #e8a0a0;
    --rose-bg:   #fdf0f0;
    --sky:       #8bbce8;
    --sky-bg:    #eef5fc;
    --sage:      #8db8a0;
    --sage-bg:   #eef6f1;
    --lavender:  #a898d8;
    --lav-bg:    #f2eefb;
    --peach:     #e8b090;
    --peach-bg:  #fdf3ec;
    --mauve:     #c8a8c0;
    --radius:    20px;
    --radius-sm: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px 60px;
    background-color: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(168,200,220,0.25) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(232,160,160,0.2) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(200,168,192,0.12) 0%, transparent 60%);
    color: var(--text);
  }

  .app { width: 100%; max-width: 480px; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem; color: var(--text);
    letter-spacing: -0.02em;
  }
  .logo em { color: var(--mauve); font-style: normal; }
  .clock {
    font-size: 0.8rem; color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 30px;
    letter-spacing: 0.05em;
  }

  /* Search */
  .search-row { display: flex; gap: 8px; margin-bottom: 24px; }
  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 13px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus {
    border-color: var(--mauve);
    box-shadow: 0 0 0 3px rgba(200,168,192,0.18);
  }
  .btn-search {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 14px;
    padding: 13px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .btn-search:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-loc {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 13px 15px;
    font-size: 1rem; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-loc:hover { background: var(--surface2); }

  /* Status */
  .status { text-align: center; padding: 20px; color: var(--muted); font-size: 0.9rem; }
  .loader {
    display: inline-block; width: 28px; height: 28px;
    border: 2.5px solid var(--border2);
    border-top-color: var(--mauve);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: var(--rose); font-size: 0.88rem; text-align: center; padding: 12px; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 12px;
    animation: popIn 0.4s cubic-bezier(.34,1.4,.64,1) both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.97) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Location row */
  .loc-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 24px;
  }
  .city { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); line-height: 1.1; }
  .country {
    display: inline-block; margin-top: 5px;
    font-size: 0.72rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.12em;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 30px;
  }
  .date { font-size: 0.8rem; color: var(--muted); text-align: right; line-height: 1.5; }

  /* Temp main */
  .temp-row {
    display: flex; align-items: center; gap: 18px; margin-bottom: 20px;
  }
  .icon-wrap {
    font-size: 4.5rem; line-height: 1;
    animation: float 5s ease-in-out infinite;
    filter: saturate(0.85) brightness(1.1);
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .temp {
    font-family: 'DM Serif Display', serif;
    font-size: 4.5rem; line-height: 1;
    color: var(--text);
    letter-spacing: -0.03em;
  }
  .temp sup { font-size: 1.8rem; vertical-align: super; }
  .desc { font-size: 0.95rem; color: var(--muted); text-transform: capitalize; margin-top: 4px; }
  .feels { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

  /* Hi/Lo */
  .hl-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.82rem; font-weight: 500;
    padding: 5px 13px; border-radius: 30px;
  }
  .badge-high { background: var(--rose-bg); color: #b06060; border: 1px solid rgba(232,160,160,0.35); }
  .badge-low  { background: var(--sky-bg);  color: #5080b0; border: 1px solid rgba(139,188,232,0.35); }

  /* Stats */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .stat {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .stat-icon { font-size: 1.3rem; }
  .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-val { font-size: 0.95rem; font-weight: 500; color: var(--text); margin-top: 2px; }

  /* Sun row */
  .sun-row { display: flex; gap: 10px; }
  .sun-item {
    flex: 1; background: var(--peach-bg); border: 1px solid rgba(232,176,144,0.3);
    border-radius: var(--radius-sm); padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .sun-icon { font-size: 1.2rem; }
  .sun-label { font-size: 0.68rem; color: #a07060; text-transform: uppercase; letter-spacing: 0.1em; }
  .sun-time { font-size: 0.88rem; font-weight: 500; color: #7a5040; margin-top: 2px; }

  /* Forecast */
  .forecast-card { animation-delay: 0.1s; }
  .section-label {
    font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }
  .fc-list { display: flex; flex-direction: column; gap: 8px; }
  .fc-item {
    display: grid; grid-template-columns: 1fr 32px 1fr auto;
    align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: var(--radius-sm);
    background: var(--surface2); border: 1px solid var(--border);
    transition: background 0.2s;
  }
  .fc-item:hover { background: #f0ebe5; }
  .fc-day { font-size: 0.88rem; font-weight: 500; }
  .fc-icon { font-size: 1.3rem; text-align: center; }
  .fc-desc { font-size: 0.75rem; color: var(--muted); text-transform: capitalize; }
  .fc-temps { font-size: 0.82rem; display: flex; gap: 8px; white-space: nowrap; }
  .fc-hi { color: #b06060; }
  .fc-lo { color: #5080b0; }

  #weather-result, #forecast-result { display: none; }

  @media (max-width: 420px) {
    .temp { font-size: 3.6rem; }
    .icon-wrap { font-size: 3.5rem; }
    .stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">Petal <em>Weather</em></div>
    <div class="clock" id="clock">—</div>
  </div>

  <div class="search-row">
    <input class="search-input" id="city" type="text" placeholder="Enter a city…"
           onkeydown="if(event.key==='Enter')getWeather()">
    <button class="btn-search" onclick="getWeather()">Search</button>
    <button class="btn-loc" onclick="getLocation()" title="Use my location">📍</button>
  </div>

  <div id="status-msg"></div>

  <div id="weather-result">
    <div class="card">
      <div class="loc-row">
        <div>
          <div class="city" id="w-city">—</div>
          <span class="country" id="w-country">—</span>
        </div>
        <div class="date" id="w-date">—</div>
      </div>

      <div class="temp-row">
        <div class="icon-wrap" id="w-icon">🌤</div>
        <div>
          <div class="temp"><span id="w-temp">—</span><sup>°C</sup></div>
          <div class="desc" id="w-desc">—</div>
          <div class="feels">Feels like <span id="w-feels">—</span>°C</div>
        </div>
      </div>

      <div class="hl-row">
        <div class="badge badge-high">↑ <span id="w-high">—</span>°C</div>
        <div class="badge badge-low">↓ <span id="w-low">—</span>°C</div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-icon">💧</div>
          <div><div class="stat-label">Humidity</div><div class="stat-val"><span id="w-humidity">—</span>%</div></div>
        </div>
        <div class="stat">
          <div class="stat-icon">🌬</div>
          <div><div class="stat-label">Wind</div><div class="stat-val"><span id="w-wind">—</span> m/s</div></div>
        </div>
        <div class="stat">
          <div class="stat-icon">👁</div>
          <div><div class="stat-label">Visibility</div><div class="stat-val"><span id="w-vis">—</span> km</div></div>
        </div>
        <div class="stat">
          <div class="stat-icon">📊</div>
          <div><div class="stat-label">Pressure</div><div class="stat-val"><span id="w-pressure">—</span> hPa</div></div>
        </div>
      </div>

      <div class="sun-row">
        <div class="sun-item">
          <div class="sun-icon">🌅</div>
          <div><div class="sun-label">Sunrise</div><div class="sun-time" id="w-rise">—</div></div>
        </div>
        <div class="sun-item">
          <div class="sun-icon">🌇</div>
          <div><div class="sun-label">Sunset</div><div class="sun-time" id="w-set">—</div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="forecast-result">
    <div class="card forecast-card">
      <div class="section-label">5-Day Forecast</div>
      <div class="fc-list" id="fc-list"></div>
    </div>
  </div>

</div>

<script>
const API_KEY = "49e83bc60b62d0cf5d132c161cb8ebe1";

// ── Clock ──────────────────────────────────────────────
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
setInterval(tick, 1000);
tick();

// ── Status helpers ─────────────────────────────────────
function setStatus(html) { document.getElementById('status-msg').innerHTML = html; }
function showLoader()     { setStatus('<div class="status"><div class="loader"></div></div>'); }
function showError(msg)   { setStatus(`<div class="error">⚠ ${msg}</div>`); }

function showResults() {
  document.getElementById('weather-result').style.display = 'block';
  document.getElementById('forecast-result').style.display = 'block';
  setStatus('');
}

// ── Weather icon mapper ────────────────────────────────
function getIcon(id, isDay = true) {
  if (id >= 200 && id < 300) return '⛈';
  if (id >= 300 && id < 400) return '🌦';
  if (id >= 500 && id < 600) return id < 502 ? '🌧' : '🌧';
  if (id >= 600 && id < 700) return '❄️';
  if (id >= 700 && id < 800) return '🌫';
  if (id === 800) return isDay ? '☀️' : '🌙';
  if (id === 801) return '🌤';
  if (id === 802) return '⛅';
  if (id >= 803) return '☁️';
  return '🌡';
}

// ── Time formatter ─────────────────────────────────────
function fmtTime(unix, offset) {
  const d = new Date((unix + offset) * 1000);
  return d.toUTCString().slice(17, 22); // HH:MM from UTC string
}

// ── Render current weather ─────────────────────────────
function renderCurrent(d) {
  const offset    = d.sys.timezone;
  const weatherId = d.weather[0].id;
  const isDay     = Date.now() / 1000 > d.sys.sunrise && Date.now() / 1000 < d.sys.sunset;
  const date      = new Date((Date.now() / 1000 + offset) * 1000);
  const dateStr   = date.toUTCString().slice(0, 16);

  document.getElementById('w-city').textContent    = d.name;
  document.getElementById('w-country').textContent = d.sys.country;
  document.getElementById('w-date').innerHTML      = dateStr;
  document.getElementById('w-icon').textContent    = getIcon(weatherId, isDay);
  document.getElementById('w-temp').textContent    = Math.round(d.main.temp);
  document.getElementById('w-feels').textContent   = Math.round(d.main.feels_like);
  document.getElementById('w-desc').textContent    = d.weather[0].description;
  document.getElementById('w-high').textContent    = Math.round(d.main.temp_max);
  document.getElementById('w-low').textContent     = Math.round(d.main.temp_min);
  document.getElementById('w-humidity').textContent= d.main.humidity;
  document.getElementById('w-wind').textContent    = d.wind.speed.toFixed(1);
  document.getElementById('w-vis').textContent     = ((d.visibility || 0) / 1000).toFixed(1);
  document.getElementById('w-pressure').textContent= d.main.pressure;
  document.getElementById('w-rise').textContent    = fmtTime(d.sys.sunrise, offset);
  document.getElementById('w-set').textContent     = fmtTime(d.sys.sunset,  offset);
}

// ── Render forecast ────────────────────────────────────
function renderForecast(d) {
  const days = {};
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  d.list.forEach(item => {
    const date = new Date(item.dt * 1000);
    const key  = date.toDateString();
    if (!days[key]) days[key] = { name: dayNames[date.getDay()], highs: [], lows: [], ids: [], descs: [] };
    days[key].highs.push(item.main.temp_max);
    days[key].lows.push(item.main.temp_min);
    days[key].ids.push(item.weather[0].id);
    days[key].descs.push(item.weather[0].description);
  });

  const entries = Object.values(days).slice(1, 6);
  const list    = document.getElementById('fc-list');
  list.innerHTML = '';

  entries.forEach(day => {
    const hi   = Math.round(Math.max(...day.highs));
    const lo   = Math.round(Math.min(...day.lows));
    const icon = getIcon(day.ids[Math.floor(day.ids.length / 2)]);
    const desc = day.descs[Math.floor(day.descs.length / 2)];

    const el   = document.createElement('div');
    el.className = 'fc-item';
    el.innerHTML = `
      <div class="fc-day">${day.name}</div>
      <div class="fc-icon">${icon}</div>
      <div class="fc-desc">${desc}</div>
      <div class="fc-temps">
        <span class="fc-hi">↑${hi}°</span>
        <span class="fc-lo">↓${lo}°</span>
      </div>`;
    list.appendChild(el);
  });
}

// ── Core fetch ────────────────────────────────────────
async function fetchWeather(params) {
  showLoader();
  try {
    const qs = new URLSearchParams({ ...params, appid: API_KEY, units: 'metric' });
    const [wRes, fRes] = await Promise.all([
      fetch(`https://api.openweathermap.org/data/2.5/weather?${qs}`),
      fetch(`https://api.openweathermap.org/data/2.5/forecast?${qs}`)
    ]);

    const wData = await wRes.json();
    const fData = await fRes.json();

    // BUG FIX: OWM returns cod=200 (number) on success, "404"/"401" (string) on error
    if (wData.cod === 401 || wData.cod === '401') throw new Error('Invalid API key — check your key or wait a few minutes for it to activate.');
    if (wData.cod === 404 || wData.cod === '404') throw new Error('City not found. Try a different spelling.');
    if (!wRes.ok) throw new Error(wData.message || 'Could not fetch weather.');
    if (!fRes.ok) throw new Error(fData.message || 'Could not fetch forecast.');

    renderCurrent(wData);
    renderForecast(fData);
    showResults();
  } catch (err) {
    showError(err.message);
  }
}

// ── Public actions ────────────────────────────────────
function getWeather() {
  const city = document.getElementById('city').value.trim();
  if (!city) { showError('Please enter a city name.'); return; }
  fetchWeather({ q: city });
}

function getLocation() {
  if (!navigator.geolocation) { showError('Geolocation not supported by your browser.'); return; }
  showLoader();
  navigator.geolocation.getCurrentPosition(
    pos => fetchWeather({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
    ()  => showError('Location access denied.')
  );
}
</script>
</body>
</html>
