<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --glass: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.15);
    --glass-hover: rgba(255,255,255,0.13);
    --text: #f0f4ff;
    --text-muted: rgba(240,244,255,0.55);
    --accent: #7ee8fa;
    --accent2: #80ff72;
    --radius: 24px;
    --shadow: 0 8px 40px rgba(0,0,0,0.35);
  }

  body {
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #0a0e1a;
    overflow-x: hidden;
    transition: background 1.2s ease;
  }

  /* Dynamic backgrounds */
  body.bg-clear     { background: linear-gradient(135deg, #0a0e1a 0%, #0d2137 40%, #1a3a5c 100%); }
  body.bg-clouds    { background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 40%, #3d3d5c 100%); }
  body.bg-rain      { background: linear-gradient(135deg, #0d0d1a 0%, #121a2e 40%, #1a2440 100%); }
  body.bg-snow      { background: linear-gradient(135deg, #0e1520 0%, #1a2535 40%, #22334a 100%); }
  body.bg-thunderstorm { background: linear-gradient(135deg, #0a0a14 0%, #160d26 40%, #200a30 100%); }
  body.bg-mist      { background: linear-gradient(135deg, #141820 0%, #1e2530 40%, #283040 100%); }
  body.bg-sunny     { background: linear-gradient(135deg, #0d1a2a 0%, #1a2e44 40%, #0d2035 100%); }

  /* Animated aurora orbs */
  .aurora {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
  }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18;
    animation: drift 18s ease-in-out infinite alternate;
  }
  .orb-1 { width: 600px; height: 600px; top: -200px; left: -100px; background: #3a7bd5; animation-duration: 20s; }
  .orb-2 { width: 400px; height: 400px; bottom: -100px; right: -50px; background: #00d2ff; animation-duration: 25s; animation-delay: -8s; }
  .orb-3 { width: 300px; height: 300px; top: 50%; left: 50%; background: #7928ca; animation-duration: 17s; animation-delay: -4s; }

  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(60px, -40px) scale(1.1); }
    100% { transform: translate(-30px, 50px) scale(0.95); }
  }

  /* Particles */
  #particles-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.4; }

  .app {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
  }

  /* Header */
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .logo {
    font-size: 1.1rem; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent);
  }
  .logo span { color: var(--text-muted); font-weight: 300; }

  /* Search */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .search-input {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 14px 20px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
    backdrop-filter: blur(10px);
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); background: var(--glass-hover); }

  .btn {
    background: linear-gradient(135deg, #3a7bd5, #00d2ff);
    border: none; border-radius: 16px;
    padding: 14px 22px; color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 1rem; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 18px rgba(58,123,213,0.4);
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 22px rgba(58,123,213,0.5); }
  .btn:active { transform: translateY(0); }
  .btn-icon {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 14px 16px;
    color: var(--text-muted);
    font-size: 1.1rem; cursor: pointer;
    transition: background 0.2s, color 0.2s;
    backdrop-filter: blur(10px);
  }
  .btn-icon:hover { background: var(--glass-hover); color: var(--accent); }

  /* Cards */
  .card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
    transition: border-color 0.4s;
  }

  /* Main weather card */
  .main-card {
    padding: 32px;
    margin-bottom: 16px;
    animation: fadeSlideIn 0.5s ease both;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .location-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .city-name {
    font-size: 1.5rem; font-weight: 700; color: var(--text);
    line-height: 1.2;
  }
  .country-badge {
    font-size: 0.75rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-top: 2px;
  }
  .local-time {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem; color: var(--text-muted);
    text-align: right;
  }

  .weather-main {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 28px;
  }
  .weather-icon-wrap {
    font-size: 5rem; line-height: 1;
    filter: drop-shadow(0 4px 16px rgba(126,232,250,0.3));
    animation: floatIcon 4s ease-in-out infinite;
  }
  @keyframes floatIcon {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .temp-block {}
  .temp-main {
    font-size: 4rem; font-weight: 700; line-height: 1;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .temp-unit { font-size: 2rem; }
  .weather-desc {
    font-size: 1rem; color: var(--text-muted);
    text-transform: capitalize; margin-top: 4px;
  }
  .feels-like {
    font-size: 0.85rem; color: var(--text-muted); margin-top: 2px;
  }

  /* Stats grid */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .stat {
    background: rgba(255,255,255,0.05);
    border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .stat-icon { font-size: 1.4rem; }
  .stat-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-value { font-size: 1rem; font-weight: 600; color: var(--text); margin-top: 1px; }

  /* High/Low row */
  .hl-row {
    display: flex; gap: 16px; margin-bottom: 20px;
  }
  .hl-badge {
    padding: 6px 14px; border-radius: 30px;
    font-size: 0.82rem; font-weight: 600;
    display: flex; align-items: center; gap: 5px;
  }
  .hl-high { background: rgba(255,100,80,0.15); color: #ff9580; border: 1px solid rgba(255,100,80,0.25); }
  .hl-low  { background: rgba(80,160,255,0.15); color: #80c8ff; border: 1px solid rgba(80,160,255,0.25); }

  /* Forecast */
  .forecast-card {
    padding: 24px;
    animation: fadeSlideIn 0.6s ease 0.15s both;
  }
  .section-title {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 16px;
  }
  .forecast-list {
    display: flex; flex-direction: column; gap: 10px;
  }
  .forecast-item {
    display: grid; grid-template-columns: 1fr auto auto auto;
    align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 14px;
    background: rgba(255,255,255,0.04);
    transition: background 0.2s;
  }
  .forecast-item:hover { background: rgba(255,255,255,0.08); }
  .fc-day { font-size: 0.9rem; font-weight: 500; color: var(--text); }
  .fc-icon { font-size: 1.4rem; }
  .fc-desc { font-size: 0.78rem; color: var(--text-muted); text-transform: capitalize; text-align: right; }
  .fc-temps { font-family: 'Space Mono', monospace; font-size: 0.82rem; display: flex; gap: 8px; }
  .fc-high { color: #ff9580; }
  .fc-low  { color: #80c8ff; }

  /* Error / Loader */
  .message-box {
    text-align: center; padding: 40px; color: var(--text-muted);
    font-size: 0.95rem;
  }
  .loader {
    display: inline-block; width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg { color: #ff8080; font-size: 0.9rem; text-align: center; padding: 14px; }

  #weather-result, #forecast-result { display: none; }

  /* Sunrise/Sunset */
  .sun-row {
    display: flex; gap: 12px; margin-top: 12px;
  }
  .sun-item {
    flex: 1; background: rgba(255,255,255,0.04);
    border-radius: 14px; padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .sun-icon { font-size: 1.3rem; }
  .sun-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .sun-time { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-top: 2px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .temp-main { font-size: 3.2rem; }
    .weather-icon-wrap { font-size: 4rem; }
  }
</style>
</head>
<body class="bg-clear">

<div class="aurora">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<canvas id="particles-canvas"></canvas>

<div class="app">
  <div class="app-header">
    <div class="logo">Aether <span>Weather</span></div>
    <div class="local-time" id="clock"></div>
  </div>

  <div class="search-bar">
    <input class="search-input" type="text" id="city" placeholder="Search city…" onkeydown="if(event.key==='Enter')getWeather()">
    <button class="btn" onclick="getWeather()">Search</button>
    <button class="btn-icon" onclick="getLocation()" title="Use my location">📍</button>
  </div>

  <div id="status-msg"></div>

  <div id="weather-result">
    <div class="main-card card">
      <div class="location-row">
        <div>
          <div class="city-name" id="w-city">—</div>
          <div class="country-badge" id="w-country">—</div>
        </div>
        <div class="local-time" id="w-date">—</div>
      </div>

      <div class="weather-main">
        <div class="weather-icon-wrap" id="w-icon">🌤</div>
        <div class="temp-block">
          <div class="temp-main"><span id="w-temp">—</span><span class="temp-unit">°C</span></div>
          <div class="weather-desc" id="w-desc">—</div>
          <div class="feels-like">Feels like <span id="w-feels">—</span>°C</div>
        </div>
      </div>

      <div class="hl-row">
        <div class="hl-badge hl-high">↑ <span id="w-high">—</span>°C</div>
        <div class="hl-badge hl-low">↓ <span id="w-low">—</span>°C</div>
      </div>

      <div class="stats-grid">
        <div class="stat">
          <div class="stat-icon">💧</div>
          <div>
            <div class="stat-label">Humidity</div>
            <div class="stat-value"><span id="w-humidity">—</span>%</div>
          </div>
        </div>
        <div class="stat">
          <div class="stat-icon">🌬</div>
          <div>
            <div class="stat-label">Wind</div>
            <div class="stat-value"><span id="w-wind">—</span> m/s</div>
          </div>
        </div>
        <div class="stat">
          <div class="stat-icon">👁</div>
          <div>
            <div class="stat-label">Visibility</div>
            <div class="stat-value"><span id="w-visibility">—</span> km</div>
          </div>
        </div>
        <div class="stat">
          <div class="stat-icon">📊</div>
          <div>
            <div class="stat-label">Pressure</div>
            <div class="stat-value"><span id="w-pressure">—</span> hPa</div>
          </div>
        </div>
      </div>

      <div class="sun-row">
        <div class="sun-item">
          <div class="sun-icon">🌅</div>
          <div>
            <div class="sun-label">Sunrise</div>
            <div class="sun-time" id="w-sunrise">—</div>
          </div>
        </div>
        <div class="sun-item">
          <div class="sun-icon">🌇</div>
          <div>
            <div class="sun-label">Sunset</div>
            <div class="sun-time" id="w-sunset">—</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="forecast-result">
    <div class="forecast-card card">
      <div class="section-title">5-Day Forecast</div>
      <div class="forecast-list" id="forecast-list"></div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
// ─── CONFIG ─────────────────────────────
const API_KEY = "49e83bc60b62d0cf5d132c161cb8ebe1"; // replace this

// Debug helper
function logApiResponse(label,data){
console.log(label,data);
}

// ─── CLOCK ─────────────────────────────
function updateClock(){
const now=new Date();
document.getElementById('clock').textContent=
now.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});
}
setInterval(updateClock,1000);
updateClock();


// ─── STATUS UI ──────────────────────────
function setStatus(html){
document.getElementById('status-msg').innerHTML=html;
}

function showResults(){
document.getElementById('weather-result').style.display='block';
document.getElementById('forecast-result').style.display='block';
document.getElementById('status-msg').innerHTML='';
}


// ─── WEATHER FETCH (FIXED) ──────────────
async function fetchByCity(city){

setStatus(`
<div class="message-box">
<div class="loader"></div>
</div>
`);

try{

const weatherURL=
`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;

const forecastURL=
`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;

const [wRes,fRes]=await Promise.all([
fetch(weatherURL),
fetch(forecastURL)
]);

const wData=await wRes.json();
const fData=await fRes.json();

logApiResponse("Current Weather:",wData);
logApiResponse("Forecast:",fData);


// Better API diagnostics
if(wData.cod==401 || wData.cod=="401"){
throw new Error("Invalid API key or key not activated yet.");
}

if(wData.cod==404 || wData.cod=="404"){
throw new Error("City not found.");
}

if(!wRes.ok){
throw new Error(
wData.message || "Weather request failed."
);
}

if(!fRes.ok){
throw new Error(
fData.message || "Forecast request failed."
);
}


// Render existing UI
renderCurrent(wData);
renderForecast(fData);
showResults();

}

catch(err){
console.error(err);

setStatus(`
<div class="error-msg">
⚠ ${err.message}
</div>
`);
}

}



// ─── GEOLOCATION FETCH (FIXED) ──────────
async function fetchByCoords(lat,lon){

setStatus(`
<div class="message-box">
<div class="loader"></div>
</div>
`);

try{

const weatherURL=
`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`;

const forecastURL=
`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`;

const [wRes,fRes]=await Promise.all([
fetch(weatherURL),
fetch(forecastURL)
]);

const wData=await wRes.json();
const fData=await fRes.json();

logApiResponse("Geo Weather:",wData);

if(wData.cod==401 || wData.cod=="401"){
throw new Error("Invalid API key.");
}

if(!wRes.ok){
throw new Error(
wData.message || "Could not fetch weather."
);
}

renderCurrent(wData);
renderForecast(fData);
showResults();

}

catch(err){

console.error(err);

setStatus(`
<div class="error-msg">
⚠ ${err.message}
</div>
`);

}

}



// ─── SEARCH BUTTON ─────────────────────
function getWeather(){

const city=
document.getElementById('city').value.trim();

if(!city){
setStatus(`
<div class="error-msg">
⚠ Please enter a city.
</div>
`);
return;
}

fetchByCity(city);

}



// ─── LOCATION BUTTON ───────────────────
function getLocation(){

if(!navigator.geolocation){

setStatus(`
<div class="error-msg">
⚠ Geolocation not supported.
</div>
`);

return;
}

setStatus(`
<div class="message-box">
<div class="loader"></div>
</div>
`);

navigator.geolocation.getCurrentPosition(

pos=>{
fetchByCoords(
pos.coords.latitude,
pos.coords.longitude
);
},

()=>{
setStatus(`
<div class="error-msg">
⚠ Location access denied.
</div>
`);
}

);

}
</script>
</body>
</html>
