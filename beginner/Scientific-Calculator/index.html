<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petal · Scientific Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calc-shell">

  <div class="brand">
    <span class="brand-name">CALC</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="mode-label">MODE</span>
      <span class="mode-pill" id="angleMode" onclick="toggleAngle()">DEG</span>
    </div>
  </div>

  <div class="display-wrap">
    <div class="expression-line" id="exprDisplay"></div>
    <div class="result-line" id="mainDisplay">0<span class="cursor-blink"></span></div>
  </div>

  <div class="mem-row">
    <button class="mem-btn" onclick="memClear()">MC</button>
    <button class="mem-btn" onclick="memRecall()">MR</button>
    <button class="mem-btn" onclick="memAdd()">M+</button>
    <button class="mem-btn" onclick="memSub()">M−</button>
    <button class="mem-btn" onclick="memStore()">MS</button>
  </div>

  <div class="btn-grid">

    <!-- Row 1: Trig -->
    <div class="row row-5">
      <button class="btn btn-fn" onclick="pressFunc('sin(')">sin</button>
      <button class="btn btn-fn" onclick="pressFunc('cos(')">cos</button>
      <button class="btn btn-fn" onclick="pressFunc('tan(')">tan</button>
      <button class="btn btn-fn" onclick="pressFunc('log10(')">log</button>
      <button class="btn btn-fn" onclick="pressFunc('ln(')">ln</button>
    </div>

    <!-- Row 2: Inverse + roots -->
    <div class="row row-5">
      <button class="btn btn-fn" onclick="pressFunc('asin(')">sin⁻¹</button>
      <button class="btn btn-fn" onclick="pressFunc('acos(')">cos⁻¹</button>
      <button class="btn btn-fn" onclick="pressFunc('atan(')">tan⁻¹</button>
      <button class="btn btn-fn" onclick="pressFunc('sqrt(')">√x</button>
      <button class="btn btn-fn" onclick="pressFunc('cbrt(')">∛x</button>
    </div>

    <!-- Row 3: Powers + constants -->
    <div class="row row-5">
      <button class="btn btn-const" onclick="pressOp('^')">xʸ</button>
      <button class="btn btn-const" onclick="pressFunc('sq(')">x²</button>
      <button class="btn btn-const" onclick="pressFunc('fact(')">n!</button>
      <button class="btn btn-const" onclick="pressConst('π')">π</button>
      <button class="btn btn-const" onclick="pressConst('e')">e</button>
    </div>

    <div class="sep"></div>

    <!-- Row 4: Clear + ops -->
    <div class="row row-4">
      <button class="btn btn-clr" onclick="allClear()">AC</button>
      <button class="btn btn-clr" onclick="deleteLast()">⌫</button>
      <button class="btn btn-fn"  onclick="pressOp('%')">%</button>
      <button class="btn btn-op"  onclick="pressOp('/')">÷</button>
    </div>

    <!-- Row 5 -->
    <div class="row row-4">
      <button class="btn btn-num" onclick="pressNum('7')">7</button>
      <button class="btn btn-num" onclick="pressNum('8')">8</button>
      <button class="btn btn-num" onclick="pressNum('9')">9</button>
      <button class="btn btn-op"  onclick="pressOp('×')">×</button>
    </div>

    <!-- Row 6 -->
    <div class="row row-4">
      <button class="btn btn-num" onclick="pressNum('4')">4</button>
      <button class="btn btn-num" onclick="pressNum('5')">5</button>
      <button class="btn btn-num" onclick="pressNum('6')">6</button>
      <button class="btn btn-op"  onclick="pressOp('−')">−</button>
    </div>

    <!-- Row 7 -->
    <div class="row row-4">
      <button class="btn btn-num" onclick="pressNum('1')">1</button>
      <button class="btn btn-num" onclick="pressNum('2')">2</button>
      <button class="btn btn-num" onclick="pressNum('3')">3</button>
      <button class="btn btn-op"  onclick="pressOp('+')">+</button>
    </div>

    <!-- Row 8 -->
    <div class="row row-4">
      <button class="btn btn-fn"  onclick="pressOpen()">(</button>
      <button class="btn btn-num" onclick="pressNum('0')">0</button>
      <button class="btn btn-num" onclick="pressDecimal()">.</button>
      <button class="btn btn-eq"  onclick="calculate()">=</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
